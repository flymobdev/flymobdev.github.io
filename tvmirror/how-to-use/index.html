<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>TV Mirror - How to use</title>
    <style>
      :root {
        --bg-color: #24292e;
        --text-color: #ffffff;
        --muted-text-color: rgba(255, 255, 255, 0.72);
        --item-bg-color: rgba(255, 255, 255, 0.06);
        --list-dot-color: #52a8ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        font-family: Roboto, Arial, sans-serif;
        background: var(--bg-color);
        color: var(--text-color);
        margin: 0;
        padding: 16px;
      }

      #guide {
        max-width: 800px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .page-title {
        margin: 4px 0 8px;
        font-size: 24px;
        font-weight: 700;
        line-height: 1.2;
      }

      .guide-section {
        background-color: var(--item-bg-color);
        padding: 20px 16px;
        border-radius: 10px;
      }

      .guide-section h2 {
        margin: 0;
        font-size: 17px;
        font-weight: 600;
        line-height: 1.2;
      }

      .guide-section ul,
      .guide-section ol {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin: 0;
        padding: 20px 0 0;
      }

      .guide-section li {
        position: relative;
        font-size: 15px;
        font-weight: 400;
        line-height: 1.35;
        color: var(--muted-text-color);
        list-style: none;
        padding-left: 16px;
      }

      .guide-section li::before {
        content: '';
        background-color: var(--list-dot-color);
        width: 6px;
        height: 6px;
        border-radius: 50%;
        position: absolute;
        left: 0;
        top: 7px;
      }

      .guide-section strong {
        color: var(--text-color);
        font-weight: 600;
      }

      .error-message {
        max-width: 800px;
        margin: 20px auto;
        padding: 15px;
        background-color: #ffebee;
        border-left: 4px solid #f44336;
        border-radius: 5px;
        color: #b71c1c;
      }
    </style>
  </head>
  <body>
    <main id="guide"></main>

    <script>
      const baseUrl = '/tvmirror/how-to-use/lang';

      const showError = message => {
        const guideContainer = document.getElementById('guide');
        guideContainer.innerHTML = `<div class="error-message">${message}</div>`;
      };

      const getQueryParam = param => {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(param) || 'en';
      };

      const getGuideData = async (callback, fallback = false) => {
        const lang = getQueryParam('hl');
        const url = `${baseUrl}/${fallback ? 'en' : lang}.json`;

        try {
          const response = await fetch(url);
          if (!response.ok) {
            throw new Error('Network Error');
          }
          const data = await response.json();
          callback(null, data);
        } catch (error) {
          callback(error);
        }
      };

      const renderItem = (list, item) => {
        const li = document.createElement('li');

        if (typeof item === 'string') {
          li.textContent = item;
        } else {
          const label = document.createElement('strong');
          label.textContent = item.label;
          li.appendChild(label);
          li.append(` ${item.text}`);
        }

        list.appendChild(li);
      };

      const renderGuide = data => {
        document.documentElement.lang = data.lang || getQueryParam('hl');
        document.title = data.title;

        const guideContainer = document.getElementById('guide');
        guideContainer.replaceChildren();

        const title = document.createElement('h1');
        title.className = 'page-title';
        title.textContent = data.title;
        guideContainer.appendChild(title);

        data.sections.forEach(section => {
          const sectionEl = document.createElement('section');
          sectionEl.className = 'guide-section';

          const heading = document.createElement('h2');
          heading.textContent = section.title;
          sectionEl.appendChild(heading);

          const list = document.createElement(section.listType === 'ol' ? 'ol' : 'ul');
          section.items.forEach(item => renderItem(list, item));
          sectionEl.appendChild(list);

          guideContainer.appendChild(sectionEl);
        });
      };

      window.onload = () => {
        getGuideData((error, data) => {
          if (error) {
            getGuideData((e, data) => {
              if (e) {
                showError('Unable to load content.');
                return;
              }
              renderGuide(data);
            }, true);
            return;
          }
          renderGuide(data);
        });
      };
    </script>
  </body>
</html>
